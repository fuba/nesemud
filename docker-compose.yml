services:
  nesd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${NESD_CONTAINER_NAME:-nesd}
    restart: unless-stopped
    network_mode: host
    environment:
      - ENV=${ENV:-PRODUCTION}
      - NESD_LISTEN_ADDR=${NESD_LISTEN_ADDR:-}
    volumes:
      - ./runtime:/data
      - ./tests:/tests:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
